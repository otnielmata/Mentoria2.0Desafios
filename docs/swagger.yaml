openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: API consolidada para desafios, pontuação, rankings, dashboards e relatórios do Método do Alavanque. A Web deve consumir somente endpoints documentados aqui e declarados no contrato central em web/src/contracts/api-endpoints.js.
x-web-contract:
  document: docs/contrato-web-api.md
  source: web/src/contracts/api-endpoints.js
  validationScript: npm run test:contract
servers:
  - url: http://localhost:3000
tags:
  - name: Auth
  - name: Heurísticas
  - name: Perfil
  - name: Alunos
  - name: Turmas
  - name: Pilares
  - name: Desafios
  - name: Envios
  - name: Admin
  - name: Auditoria
  - name: Ranking
  - name: Relatórios
  - name: Health
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um usuário aluno
      responses:
        "201":
          description: Usuário criado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna JWT
      responses:
        "200":
          description: Login realizado
  /api/usuarios/registro:
    post:
      tags: [Auth]
      summary: Alias MR-1 para registrar usuário
      responses:
        "201":
          description: Usuário criado
  /api/usuarios/login:
    post:
      tags: [Auth]
      summary: Alias MR-2 para autenticar usuário
      responses:
        "200":
          description: Login realizado
  /api/heuristicas:
    get:
      tags: [Heurísticas]
      security:
        - bearerAuth: []
      summary: Lista heurísticas ativas e publicáveis
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Heurísticas]
      security:
        - bearerAuth: []
      summary: Cadastra heurística para o usuário autenticado
      responses:
        "201":
          description: Heurística criada
  /api/me:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Consulta dados do usuário autenticado
      responses:
        "200":
          description: Perfil encontrado
    patch:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Atualiza nome e senha do próprio perfil sem permitir alterar turma, status ou perfil
      responses:
        "200":
          description: Perfil atualizado
        "400":
          description: Campo administrativo bloqueado ou senha atual ausente
        "401":
          description: Senha atual inválida
  /api/users/me:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Consulta dados do usuário autenticado para a Web
      responses:
        "200":
          description: Perfil encontrado
        "401":
          description: Token inválido ou ausente
  /api/users:
    get:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Lista usuários/alunos para professor ou admin
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
    post:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Cadastra aluno para professor ou admin
      responses:
        "201":
          description: Aluno cadastrado
        "403":
          description: Perfil sem permissão
  /api/alunos:
    get:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Lista alunos
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Cadastra aluno
      responses:
        "201":
          description: Aluno cadastrado
  /api/alunos/{id}:
    get:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Visualiza aluno com turmas e resumo de pontuação
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Aluno retornado
    patch:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Edita dados de aluno
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Aluno atualizado
    delete:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Desativa aluno por status inativo
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Aluno desativado
  /api/alunos/:id:
    patch:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Edita aluno pelo caminho usado pela Web
      responses:
        "200":
          description: Aluno atualizado
  /api/turmas:
    get:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Lista turmas
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Cadastra turma
      responses:
        "201":
          description: Turma cadastrada
  /api/turmas/{id}:
    get:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Visualiza turma com quantidade de alunos
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Turma retornada
    patch:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Edita turma
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Turma atualizada
    delete:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Encerra turma sem apagar histórico
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Turma encerrada
  /api/turmas/{turmaId}/alunos:
    post:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Matricula aluno em turma usando alunos_turmas
      parameters:
        - $ref: "#/components/parameters/turmaId"
      responses:
        "201":
          description: Matrícula criada
  /api/turmas/{turmaId}/alunos/{alunoId}:
    delete:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Remove aluno da turma preservando histórico em alunos_turmas
      parameters:
        - $ref: "#/components/parameters/turmaId"
        - $ref: "#/components/parameters/alunoId"
      responses:
        "200":
          description: Matrícula removida
  /api/pilares:
    get:
      tags: [Pilares]
      security:
        - bearerAuth: []
      summary: Lista pilares do Método do Alavanque
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Pilares]
      security:
        - bearerAuth: []
      summary: Cadastra pilar
      responses:
        "201":
          description: Pilar cadastrado
  /api/pilares/:id:
    patch:
      tags: [Pilares]
      security:
        - bearerAuth: []
      summary: Edita pilar pelo caminho usado pela Web
      responses:
        "200":
          description: Pilar atualizado
    delete:
      tags: [Pilares]
      security:
        - bearerAuth: []
      summary: Exclui pilar da lista ativa pelo caminho usado pela Web
      responses:
        "200":
          description: Pilar inativado
  /api/desafios:
    get:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Lista desafios
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Cadastra desafio com pilar, pontuação fixa, data limite de entrega, participantes por grupo e status
      responses:
        "201":
          description: Desafio cadastrado
        "400":
          description: Pontuação fixa ausente ou limite de participantes inválido
  /api/desafios/:id:
    patch:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Edita desafio, inclusive status e pontos de apresentação ao vivo
      responses:
        "200":
          description: Desafio atualizado
    delete:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Desativa desafio pelo caminho usado pela Web
      responses:
        "200":
          description: Desafio desativado
  /api/desafios/inscricoes/minhas:
    get:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Lista inscrições do aluno em desafios ativos e seus grupos automáticos
      responses:
        "200":
          description: Inscrições retornadas
        "403":
          description: Perfil sem permissão
  /api/desafios/:id/inscricoes:
    post:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Inscreve aluno em desafio ativo e forma grupo automaticamente
      responses:
        "201":
          description: Inscrição criada e grupo atribuído
        "400":
          description: Aluno sem turma ativa ou desafio inativo
        "409":
          description: Aluno já inscrito no desafio
  /api/envios-desafios:
    post:
      tags: [Envios]
      security:
        - bearerAuth: []
      summary: Registra desafio executado pelo aluno
      responses:
        "201":
          description: Envio criado com status pendente, responsável como líder e evidência obrigatória
        "400":
          description: Evidência ausente, tipo inválido ou limite de participantes excedido
        "403":
          description: Perfil sem permissão
  /api/envios-desafios/meus:
    get:
      tags: [Envios]
      security:
        - bearerAuth: []
      summary: Lista envios do aluno autenticado
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
  /api/envios-desafios/aprovacoes:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Lista envios pendentes para aprovação de professor ou admin
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Aprova, reprova ou solicita ajuste usando envio_desafio_id no corpo
      responses:
        "200":
          description: Envio avaliado; aprovação gera pontos quando não há duplicidade de evidência
        "400":
          description: Feedback obrigatório ausente ou envio inválido para avaliação
        "403":
          description: Perfil sem permissão
        "409":
          description: Pontuação duplicada para mesma evidência, desafio e aluno
  /api/envios-desafios/{id}/participantes:
    put:
      tags: [Envios]
      security:
        - bearerAuth: []
      summary: Atualiza participantes do envio em grupo usando participantes_envio
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Participantes atualizados
  /api/admin/envios-desafios/pendentes:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Lista envios pendentes de aprovação
      responses:
        "200":
          description: Lista retornada
  /api/admin/envios-desafios/{id}/avaliacao:
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Aprova, reprova ou solicita ajuste em envio
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Envio avaliado e pontuação gerada quando aprovado sem duplicidade de evidência
        "400":
          description: Feedback obrigatório ausente ou envio inválido para avaliação
        "409":
          description: Pontuação duplicada para mesma evidência, desafio e aluno
  /api/grupos:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Lista grupos para professor ou admin
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
  /api/grupos/meus:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Lista grupos do aluno autenticado
      responses:
        "200":
          description: Lista retornada
  /api/grupos/:id/contato:
    patch:
      tags: [Grupos]
      security:
        - bearerAuth: []
      summary: Atualiza link de contato do grupo automático do aluno
      responses:
        "200":
          description: Contato atualizado
        "400":
          description: Tipo ou link inválido
        "403":
          description: Usuário não participa do grupo
        "403":
          description: Perfil sem permissão
  /api/pontuacoes/minha:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Consulta total, pontos por pilar e histórico aprovado do aluno autenticado
      parameters:
        - in: query
          name: turmaId
          schema:
            type: string
          description: Filtra pontos aprovados por turma
        - in: query
          name: pilarId
          schema:
            type: string
          description: Filtra pontos aprovados por pilar/categoria
        - in: query
          name: dataInicio
          schema:
            type: string
            format: date
          description: Data inicial do período de pontuação
        - in: query
          name: dataFim
          schema:
            type: string
            format: date
          description: Data final do período de pontuação
      responses:
        "200":
          description: Pontuação aprovada retornada
        "403":
          description: Perfil sem permissão
  /api/me/pontuacoes:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Alias para consultar pontuação aprovada e histórico do aluno
      responses:
        "200":
          description: Pontuação aprovada retornada
  /api/ranking:
    get:
      tags: [Ranking]
      security:
        - bearerAuth: []
      summary: Ranking geral consumido pela Web, ordenado por pontos aprovados
      parameters:
        - in: query
          name: turmaId
          schema:
            type: string
          description: Filtra ranking por turma quando informado
        - in: query
          name: pilarId
          schema:
            type: string
          description: Filtra ranking por pilar/categoria
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: Data inicial do período de pontuação
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: Data final do período de pontuação
        - in: query
          name: type
          schema:
            type: string
            enum: [individual, grupo]
          description: Filtra por tipo do envio aprovado
      responses:
        "200":
          description: Ranking retornado usando somente pontuações aprovadas
        "401":
          description: Token inválido ou ausente
  /api/ranking/admin:
    get:
      tags: [Ranking]
      security:
        - bearerAuth: []
      summary: Ranking administrativo com filtros por turma, pilar, período ou tipo
      parameters:
        - in: query
          name: turmaId
          schema:
            type: string
          description: Filtra ranking por turma
        - in: query
          name: pilarId
          schema:
            type: string
          description: Filtra ranking por pilar/categoria
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: Data inicial do período de pontuação
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: Data final do período de pontuação
        - in: query
          name: type
          schema:
            type: string
            enum: [individual, grupo]
          description: Filtra por tipo do envio aprovado
      responses:
        "200":
          description: Ranking filtrado retornado usando somente pontuações aprovadas
        "403":
          description: Perfil sem permissão
  /api/rankings:
    get:
      tags: [Ranking]
      security:
        - bearerAuth: []
      summary: Ranking com filtros por turma, pilar, período e tipo
      responses:
        "200":
          description: Ranking retornado
  /api/dashboard/aluno:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Dashboard consolidado do aluno consumido pela Web
      responses:
        "200":
          description: Retorna pontos totais, ranking, desafios enviados, evolução por categoria e últimos envios
        "403":
          description: Perfil sem permissão
  /api/me/dashboard:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Alias do dashboard consolidado do aluno
      responses:
        "200":
          description: Dashboard consolidado retornado
  /api/dashboard/admin:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Dashboard administrativo consolidado consumido pela Web
      responses:
        "200":
          description: Retorna pendências, alunos ativos, ranking, rankings por turma/pilar e métricas de participação
        "403":
          description: Perfil sem permissão
  /api/admin/dashboard:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Alias do dashboard administrativo consolidado
      responses:
        "200":
          description: Dashboard consolidado retornado
  /api/relatorios/participacao:
    get:
      tags: [Relatórios]
      security:
        - bearerAuth: []
      summary: Relatório consolidado de participação para professor ou admin
      parameters:
        - in: query
          name: turmaId
          schema:
            type: string
          description: Filtra participação por turma
        - in: query
          name: pilarId
          schema:
            type: string
          description: Filtra participação por pilar/categoria
        - in: query
          name: dataInicio
          schema:
            type: string
            format: date
          description: Data inicial do período avaliado
        - in: query
          name: dataFim
          schema:
            type: string
            format: date
          description: Data final do período avaliado
        - in: query
          name: diasSemEnvio
          schema:
            type: integer
            minimum: 0
          description: Critério opcional para indicar baixa participação por ausência de envio
        - in: query
          name: pontuacaoMinima
          schema:
            type: number
            minimum: 0
          description: Critério opcional para indicar baixa participação por pontuação mínima
      responses:
        "200":
          description: Retorna participação por aluno, turma, período, distribuição de pontos e baixa participação quando aplicável
        "403":
          description: Perfil sem permissão
  /api/admin/relatorios/participacao:
    get:
      tags: [Relatórios]
      security:
        - bearerAuth: []
      summary: Alias do relatório consolidado de participação
      responses:
        "200":
          description: Relatório consolidado retornado
  /api/admin/relatorios/baixa-participacao:
    get:
      tags: [Relatórios]
      security:
        - bearerAuth: []
      summary: Relatório de alunos com baixa participação
      responses:
        "200":
          description: Relatório retornado
  /api/auditorias:
    get:
      tags: [Auditoria]
      security:
        - bearerAuth: []
      summary: Consulta histórico auditável de domínio para professor ou admin
      parameters:
        - in: query
          name: eventType
          schema:
            type: string
          description: Filtra por tipo de evento, como envio_criado, envio_avaliado ou pontuacao_gerada
        - in: query
          name: alunoId
          schema:
            type: string
          description: Filtra por aluno relacionado
        - in: query
          name: actorId
          schema:
            type: string
          description: Filtra por usuário que executou a ação
        - in: query
          name: desafioId
          schema:
            type: string
          description: Filtra por desafio
        - in: query
          name: envioId
          schema:
            type: string
          description: Filtra por envio de desafio
        - in: query
          name: turmaId
          schema:
            type: string
          description: Filtra por turma
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: Data inicial do histórico
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: Data final do histórico
      responses:
        "200":
          description: Histórico retornado sem senha, token, hash ou segredos
        "403":
          description: Perfil sem permissão
  /api/admin/auditorias:
    get:
      tags: [Auditoria]
      security:
        - bearerAuth: []
      summary: Alias administrativo para consulta de auditoria
      responses:
        "200":
          description: Histórico retornado
  /api/configuracoes:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Configurações funcionais somente leitura para professor ou admin
      description: Retorna flags funcionais do MVP, incluindo ranking para alunos, bônus de liderança desligado, desafios recorrentes e conquistas futuras, sem segredos técnicos.
      responses:
        "200":
          description: Configurações retornadas em modo somente leitura
        "403":
          description: Perfil sem permissão
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    id:
      in: path
      name: id
      required: true
      schema:
        type: string
    turmaId:
      in: path
      name: turmaId
      required: true
      schema:
        type: string
    alunoId:
      in: path
      name: alunoId
      required: true
      schema:
        type: string
