openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/pilares/{id}:
    get:
      tags: [Pilares]
      summary: Visualiza pilar do Método do Alavanque
      description: Alunos só podem visualizar pilares ativos. Professor e admin podem visualizar pilares independentemente do status.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador do pilar
          schema:
            type: string
            example: 6814f12ab3f34872f7558f49
      responses:
        "200":
          description: Pilar encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilarResponse"
        "401":
          description: Token inválido ou ausente
        "404":
          description: Pilar inexistente, inacessível ou usuário autenticado não encontrado
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        role:
          type: string
          example: aluno
    PilarDesafio:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f50
        title:
          type: string
          example: Diagnosticar ponto de partida
        name:
          type: string
          example: Diagnóstico inicial
        description:
          type: string
          example: Mapear o estado atual antes da execução.
        status:
          type: string
          example: ativo
    Pilar:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Clareza
        description:
          type: string
          example: Pilar do Método do Alavanque
        status:
          type: string
          example: ativo
        desafios:
          type: array
          items:
            $ref: "#/components/schemas/PilarDesafio"
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    PilarResponse:
      type: object
      properties:
        pilar:
          $ref: "#/components/schemas/Pilar"
