openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/turmas:
    post:
      tags: [Turmas]
      summary: Cadastra uma turma
      description: Apenas usuários autenticados com role professor ou admin podem cadastrar turmas.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTurmaRequest"
      responses:
        "201":
          description: Turma cadastrada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurmaResponse"
        "400":
          description: Dados inválidos ou período inconsistente
        "401":
          description: Token inválido ou ausente
        "403":
          description: Usuário autenticado não pode cadastrar turmas
        "404":
          description: Usuário autenticado não encontrado
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
    Turma:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Turma Frontend
        status:
          type: string
          example: ativa
        startDate:
          type: string
          format: date-time
          example: "2026-07-01T00:00:00.000Z"
        endDate:
          type: string
          format: date-time
          example: "2026-08-01T00:00:00.000Z"
    CreateTurmaRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Turma Frontend
        startDate:
          type: string
          format: date
          description: Data inicial opcional.
          example: "2026-07-01"
        endDate:
          type: string
          format: date
          description: Data final opcional.
          example: "2026-08-01"
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    TurmaResponse:
      type: object
      properties:
        turma:
          $ref: "#/components/schemas/Turma"
