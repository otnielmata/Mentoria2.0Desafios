openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/pilares:
    get:
      tags: [Pilares]
      summary: Lista pilares do Método do Alavanque
      description: Todos os usuários autenticados podem listar pilares. Alunos visualizam apenas ativos; professor e admin podem filtrar por status.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            example: ativo
          description: Filtro por status disponível para professor e admin. Alunos permanecem restritos a pilares ativos.
      responses:
        "200":
          description: Pilares listados com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilarListResponse"
        "400":
          description: Filtro inválido
        "401":
          description: Token inválido ou ausente
        "404":
          description: Usuário autenticado não encontrado
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
    Pilar:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Clareza
        description:
          type: string
          example: Pilar do Método do Alavanque
        status:
          type: string
          example: ativo
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    PilarListResponse:
      type: object
      properties:
        pilares:
          type: array
          items:
            $ref: "#/components/schemas/Pilar"
