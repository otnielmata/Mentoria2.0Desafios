openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/turmas/{turmaId}/alunos:
    post:
      tags: [Turmas]
      summary: Matricula aluno em turma
      description: Cria vínculo entre aluno ativo e turma ativa. Apenas professor ou admin pode executar.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: turmaId
          required: true
          schema:
            type: string
          description: Identificador da turma.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollStudentRequest"
      responses:
        "201":
          description: Matrícula criada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentResponse"
        "400":
          description: Payload inválido, aluno inativo ou turma inativa
        "401":
          description: Token inválido ou ausente
        "403":
          description: Usuário autenticado não pode matricular alunos em turmas
        "404":
          description: Usuário autenticado, turma ou aluno não encontrado
        "409":
          description: Aluno já matriculado na turma
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
    EnrollStudentRequest:
      type: object
      required: [studentId]
      properties:
        studentId:
          type: string
          example: 6814f12ab3f34872f7558f50
    Enrollment:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49:6814f12ab3f34872f7558f50
        turmaId:
          type: string
          example: 6814f12ab3f34872f7558f49
        studentId:
          type: string
          example: 6814f12ab3f34872f7558f50
        status:
          type: string
          example: ativa
        student:
          type: object
          properties:
            id:
              type: string
              example: 6814f12ab3f34872f7558f50
            name:
              type: string
              example: Aluno Teste
            email:
              type: string
              format: email
              example: aluno@email.com
            status:
              type: string
              example: ativo
        turma:
          type: object
          properties:
            id:
              type: string
              example: 6814f12ab3f34872f7558f49
            name:
              type: string
              example: Turma Frontend
            status:
              type: string
              example: ativa
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    EnrollmentResponse:
      type: object
      properties:
        matricula:
          $ref: "#/components/schemas/Enrollment"
