openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: API consolidada para desafios, pontuação, rankings, dashboards e relatórios do Método do Alavanque.
servers:
  - url: http://localhost:3000
tags:
  - name: Auth
  - name: Heurísticas
  - name: Perfil
  - name: Alunos
  - name: Turmas
  - name: Pilares
  - name: Desafios
  - name: Envios
  - name: Admin
  - name: Ranking
  - name: Relatórios
  - name: Health
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um usuário aluno
      responses:
        "201":
          description: Usuário criado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna JWT
      responses:
        "200":
          description: Login realizado
  /api/usuarios/registro:
    post:
      tags: [Auth]
      summary: Alias MR-1 para registrar usuário
      responses:
        "201":
          description: Usuário criado
  /api/usuarios/login:
    post:
      tags: [Auth]
      summary: Alias MR-2 para autenticar usuário
      responses:
        "200":
          description: Login realizado
  /api/heuristicas:
    get:
      tags: [Heurísticas]
      security:
        - bearerAuth: []
      summary: Lista heurísticas ativas e publicáveis
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Heurísticas]
      security:
        - bearerAuth: []
      summary: Cadastra heurística para o usuário autenticado
      responses:
        "201":
          description: Heurística criada
  /api/me:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Consulta dados do usuário autenticado
      responses:
        "200":
          description: Perfil encontrado
    patch:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Atualiza dados editáveis do perfil
      responses:
        "200":
          description: Perfil atualizado
  /api/users/me:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Consulta dados do usuário autenticado para a Web
      responses:
        "200":
          description: Perfil encontrado
        "401":
          description: Token inválido ou ausente
  /api/users:
    get:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Lista usuários/alunos para professor ou admin
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
    post:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Cadastra aluno para professor ou admin
      responses:
        "201":
          description: Aluno cadastrado
        "403":
          description: Perfil sem permissão
  /api/alunos:
    get:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Lista alunos
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Cadastra aluno
      responses:
        "201":
          description: Aluno cadastrado
  /api/alunos/{id}:
    get:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Visualiza aluno com turmas e resumo de pontuação
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Aluno retornado
    patch:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Edita dados de aluno
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Aluno atualizado
    delete:
      tags: [Alunos]
      security:
        - bearerAuth: []
      summary: Desativa aluno por status inativo
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Aluno desativado
  /api/turmas:
    get:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Lista turmas
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Cadastra turma
      responses:
        "201":
          description: Turma cadastrada
  /api/turmas/{id}:
    get:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Visualiza turma com quantidade de alunos
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Turma retornada
    patch:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Edita turma
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Turma atualizada
    delete:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Encerra turma sem apagar histórico
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Turma encerrada
  /api/turmas/{turmaId}/alunos:
    post:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Matricula aluno em turma usando alunos_turmas
      parameters:
        - $ref: "#/components/parameters/turmaId"
      responses:
        "201":
          description: Matrícula criada
  /api/turmas/{turmaId}/alunos/{alunoId}:
    delete:
      tags: [Turmas]
      security:
        - bearerAuth: []
      summary: Remove aluno da turma preservando histórico em alunos_turmas
      parameters:
        - $ref: "#/components/parameters/turmaId"
        - $ref: "#/components/parameters/alunoId"
      responses:
        "200":
          description: Matrícula removida
  /api/pilares:
    get:
      tags: [Pilares]
      security:
        - bearerAuth: []
      summary: Lista pilares do Método do Alavanque
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Pilares]
      security:
        - bearerAuth: []
      summary: Cadastra pilar
      responses:
        "201":
          description: Pilar cadastrado
  /api/desafios:
    get:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Lista desafios
      responses:
        "200":
          description: Lista retornada
    post:
      tags: [Desafios]
      security:
        - bearerAuth: []
      summary: Cadastra desafio com dificuldade e pontuação
      responses:
        "201":
          description: Desafio cadastrado
  /api/envios-desafios:
    post:
      tags: [Envios]
      security:
        - bearerAuth: []
      summary: Registra desafio executado pelo aluno
      responses:
        "201":
          description: Envio criado
        "403":
          description: Perfil sem permissão
  /api/envios-desafios/meus:
    get:
      tags: [Envios]
      security:
        - bearerAuth: []
      summary: Lista envios do aluno autenticado
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
  /api/envios-desafios/aprovacoes:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Lista envios pendentes para aprovação de professor ou admin
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Aprova, reprova ou solicita ajuste usando envio_desafio_id no corpo
      responses:
        "200":
          description: Envio avaliado
        "403":
          description: Perfil sem permissão
  /api/envios-desafios/{id}/participantes:
    put:
      tags: [Envios]
      security:
        - bearerAuth: []
      summary: Atualiza participantes do envio em grupo usando participantes_envio
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Participantes atualizados
  /api/admin/envios-desafios/pendentes:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Lista envios pendentes de aprovação
      responses:
        "200":
          description: Lista retornada
  /api/admin/envios-desafios/{id}/avaliacao:
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Aprova, reprova ou solicita ajuste em envio
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Envio avaliado e pontuação gerada quando aprovado
  /api/grupos:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Lista grupos para professor ou admin
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
  /api/grupos/meus:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Lista grupos do aluno autenticado
      responses:
        "200":
          description: Lista retornada
        "403":
          description: Perfil sem permissão
  /api/pontuacoes/minha:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Consulta pontuação e histórico do aluno autenticado
      responses:
        "200":
          description: Pontuação retornada
        "403":
          description: Perfil sem permissão
  /api/me/pontuacoes:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Consulta pontuação e histórico do aluno
      responses:
        "200":
          description: Pontuação retornada
  /api/ranking:
    get:
      tags: [Ranking]
      security:
        - bearerAuth: []
      summary: Ranking geral consumido pela Web
      responses:
        "200":
          description: Ranking retornado
        "401":
          description: Token inválido ou ausente
  /api/ranking/admin:
    get:
      tags: [Ranking]
      security:
        - bearerAuth: []
      summary: Ranking administrativo com filtros para professor ou admin
      responses:
        "200":
          description: Ranking retornado
        "403":
          description: Perfil sem permissão
  /api/rankings:
    get:
      tags: [Ranking]
      security:
        - bearerAuth: []
      summary: Ranking com filtros por turma, pilar, período e tipo
      responses:
        "200":
          description: Ranking retornado
  /api/dashboard/aluno:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Dashboard do aluno consumido pela Web
      responses:
        "200":
          description: Dashboard retornado
        "403":
          description: Perfil sem permissão
  /api/me/dashboard:
    get:
      tags: [Perfil]
      security:
        - bearerAuth: []
      summary: Dashboard do aluno
      responses:
        "200":
          description: Dashboard retornado
  /api/dashboard/admin:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Dashboard administrativo consumido pela Web
      responses:
        "200":
          description: Dashboard retornado
        "403":
          description: Perfil sem permissão
  /api/admin/dashboard:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Dashboard administrativo
      responses:
        "200":
          description: Dashboard retornado
  /api/relatorios/participacao:
    get:
      tags: [Relatórios]
      security:
        - bearerAuth: []
      summary: Relatório de participação para professor ou admin
      responses:
        "200":
          description: Relatório retornado
        "403":
          description: Perfil sem permissão
  /api/admin/relatorios/participacao:
    get:
      tags: [Relatórios]
      security:
        - bearerAuth: []
      summary: Relatório de participação
      responses:
        "200":
          description: Relatório retornado
  /api/admin/relatorios/baixa-participacao:
    get:
      tags: [Relatórios]
      security:
        - bearerAuth: []
      summary: Relatório de alunos com baixa participação
      responses:
        "200":
          description: Relatório retornado
  /api/configuracoes:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Configurações iniciais somente leitura para professor ou admin
      responses:
        "200":
          description: Configurações retornadas
        "403":
          description: Perfil sem permissão
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    id:
      in: path
      name: id
      required: true
      schema:
        type: string
    turmaId:
      in: path
      name: turmaId
      required: true
      schema:
        type: string
    alunoId:
      in: path
      name: alunoId
      required: true
      schema:
        type: string
