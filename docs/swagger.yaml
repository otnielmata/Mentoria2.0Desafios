openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
  /api/turmas/{turmaId}/alunos:
    post:
      tags: [Turmas]
      summary: Matricula aluno na turma usando alunos_turmas
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/turmaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId]
              properties:
                studentId:
                  type: string
                  example: 6814f12ab3f34872f7558f50
      responses:
        "201":
          description: Matrícula criada
        "409":
          description: Aluno já matriculado nesta turma
  /api/turmas/{turmaId}/alunos/{alunoId}:
    delete:
      tags: [Turmas]
      summary: Remove aluno da turma preservando histórico em alunos_turmas
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/turmaId"
        - $ref: "#/components/parameters/alunoId"
      responses:
        "200":
          description: Matrícula marcada como removida
  /api/envios-desafios:
    post:
      tags: [Envios]
      summary: Registra envio de desafio e cria participantes_envio quando for grupo
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Envio criado
  /api/envios-desafios/{id}/participantes:
    put:
      tags: [Envios]
      summary: Atualiza participantes ativos em participantes_envio
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Participantes atualizados
  /api/admin/envios-desafios/{id}/avaliacao:
    patch:
      tags: [Admin]
      summary: Avalia envio e pontua participantes ativos de participantes_envio
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Envio avaliado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    id:
      in: path
      name: id
      required: true
      schema:
        type: string
    turmaId:
      in: path
      name: turmaId
      required: true
      schema:
        type: string
    alunoId:
      in: path
      name: alunoId
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    AlunoTurma:
      type: object
      properties:
        aluno:
          type: string
        turma:
          type: string
        status:
          type: string
          example: ativa
        removedAt:
          type: string
          format: date-time
          nullable: true
    ParticipanteEnvio:
      type: object
      properties:
        envio:
          type: string
        aluno:
          type: string
        status:
          type: string
          example: ativo
        removedAt:
          type: string
          format: date-time
          nullable: true
