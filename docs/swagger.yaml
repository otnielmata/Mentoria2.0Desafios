openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/configuracoes:
    get:
      tags: [Configurações]
      summary: Consulta configurações iniciais da aplicação
      description: Retorna parâmetros funcionais seguros em modo somente leitura para professor/admin.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Configurações disponíveis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigurationsResponse"
        "401":
          description: Token inválido ou ausente
        "403":
          description: Perfil sem permissão
  /api/grupos/meus:
    get:
      tags: [Grupos]
      summary: Consulta os grupos do aluno autenticado
      description: Retorna apenas desafios em grupo nos quais o aluno autenticado é responsável ou participante.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Grupos do aluno autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyGroupsResponse"
        "401":
          description: Token inválido ou ausente
        "403":
          description: Perfil sem permissão
  /api/users/me:
    get:
      tags: [Users]
      summary: Consulta a sessão do usuário autenticado
      description: Retorna dados seguros de sessão usados pela Web para liberar menus e rotas por perfil.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usuário autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSessionResponse"
        "401":
          description: Token inválido ou ausente
        "404":
          description: Usuário autenticado não encontrado
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        role:
          type: string
          enum: [aluno, professor, admin]
          example: professor
        status:
          type: string
          enum: [ativo, inativo]
          example: ativo
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    UserSessionResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
    ConfigurationParameter:
      type: object
      properties:
        id:
          type: string
          example: ranking-geral-alunos
        name:
          type: string
          example: Ranking geral para alunos
        description:
          type: string
          example: Define se alunos podem visualizar o ranking geral no MVP.
        type:
          type: string
          example: boolean
        value:
          oneOf:
            - type: string
            - type: boolean
            - type: number
          example: true
        editable:
          type: boolean
          example: false
    ConfigurationsResponse:
      type: object
      properties:
        readOnly:
          type: boolean
          example: true
        editingEnabled:
          type: boolean
          example: false
        ranking:
          type: object
          properties:
            generalVisibleToStudents:
              type: boolean
              example: true
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/ConfigurationParameter"
    GroupUser:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Maria Silva
        role:
          type: string
          enum: [aluno, professor, admin]
          example: aluno
        status:
          type: string
          example: ativo
    MyGroup:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        envioId:
          type: string
          example: 6814f12ab3f34872f7558f49
        desafioTitulo:
          type: string
          example: Publicar artigo em grupo
        pilarNome:
          type: string
          example: Compartilhamento
        responsavelNome:
          type: string
          example: Maria Silva
        participantes:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/GroupUser"
        status:
          type: string
          enum: [pendente, aprovado, reprovado, ajuste]
          example: aprovado
        pontos:
          type: number
          example: 30
        pontosConcedidos:
          type: number
          nullable: true
          example: 30
        pontuacaoConsideradaNoRanking:
          type: boolean
          example: true
    MyGroupsResponse:
      type: object
      properties:
        grupos:
          type: array
          items:
            $ref: "#/components/schemas/MyGroup"
