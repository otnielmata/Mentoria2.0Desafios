openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/heuristicas:
    post:
      tags: [Heuristicas]
      summary: Cadastra uma heurística
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeuristicRequest"
      responses:
        "201":
          description: Heurística criada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeuristicResponse"
        "400":
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autorizado
        "409":
          description: Título duplicado para o autor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    HeuristicRequest:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          example: Visibilidade do status do sistema
        description:
          type: string
          example: O sistema deve manter o usuário informado sobre o que está acontecendo.
    HeuristicResponse:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        title:
          type: string
          example: Visibilidade do status do sistema
        description:
          type: string
          example: O sistema deve manter o usuário informado sobre o que está acontecendo.
        authorId:
          type: string
          example: 6814f12ab3f34872f7558f01
        authorEmail:
          type: string
          example: user@email.com
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Dados de validação inválidos.
        code:
          type: string
          example: VALIDATION_ERROR
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: title
              message:
                type: string
                example: Título é obrigatório.
