openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/turmas:
    get:
      tags: [Turmas]
      summary: Lista turmas
      description: Apenas usuários autenticados com role professor ou admin podem listar turmas.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Página da listagem.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Quantidade de itens por página. Valores acima de 100 são limitados a 100.
        - in: query
          name: status
          schema:
            type: string
            example: ativa
          description: Filtra turmas pelo status informado.
      responses:
        "200":
          description: Turmas listadas com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurmaListResponse"
        "400":
          description: Parâmetros de paginação ou filtro inválidos
        "401":
          description: Token inválido ou ausente
        "403":
          description: Usuário autenticado não pode listar turmas
        "404":
          description: Usuário autenticado não encontrado
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
    Turma:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Turma Frontend
        status:
          type: string
          example: ativa
        startDate:
          type: string
          format: date-time
          example: "2026-07-01T00:00:00.000Z"
        endDate:
          type: string
          format: date-time
          example: "2026-08-01T00:00:00.000Z"
        totals:
          type: object
          additionalProperties: true
          example:
            students: 24
            activeStudents: 22
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    TurmaListResponse:
      type: object
      properties:
        turmas:
          type: array
          items:
            $ref: "#/components/schemas/Turma"
        pagination:
          $ref: "#/components/schemas/Pagination"
