openapi: 3.0.3
info:
  title: Mentoria API
  version: 1.0.0
  description: Estrutura inicial de API REST com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        "200":
          description: API disponível
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
  /api/alunos:
    get:
      tags: [Alunos]
      summary: Lista alunos
      description: Apenas usuários autenticados com role professor ou admin podem listar alunos.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Página da listagem.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Quantidade de alunos por página.
        - in: query
          name: turmaId
          schema:
            type: string
          description: Filtra alunos vinculados à turma informada.
        - in: query
          name: status
          schema:
            type: string
          description: Filtra alunos pelo status.
        - in: query
          name: search
          schema:
            type: string
          description: Busca textual por nome ou e-mail.
      responses:
        "200":
          description: Lista paginada de alunos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentListResponse"
        "400":
          description: Parâmetros de filtro ou paginação inválidos
        "401":
          description: Token inválido ou ausente
        "403":
          description: Usuário autenticado não pode listar alunos
        "404":
          description: Usuário autenticado não encontrado
  /api/health/protected:
    get:
      tags: [Health]
      summary: Exemplo de rota protegida por JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: otniel@email.com
        password:
          type: string
          format: password
          example: "123456"
    User:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f49
        name:
          type: string
          example: Otniel Mata
        email:
          type: string
          format: email
          example: otniel@email.com
    Student:
      type: object
      properties:
        id:
          type: string
          example: 6814f12ab3f34872f7558f50
        name:
          type: string
          example: Maria Silva
        email:
          type: string
          format: email
          example: maria@email.com
        role:
          type: string
          example: aluno
        status:
          type: string
          example: ativo
        turmas:
          type: array
          items:
            type: string
          example: ["6814f12ab3f34872f7558f49"]
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    StudentListResponse:
      type: object
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/Student"
        pagination:
          $ref: "#/components/schemas/Pagination"
